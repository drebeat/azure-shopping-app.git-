<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Shopping Catalog</h1>

    <form id="product-form">
      <input type="hidden" id="product-id">
      <div class="form-group">
        <input type="text" id="product-name" placeholder="Product name" required>
      </div>
      <div class="form-group">
        <input type="number" id="product-price" placeholder="Price" step="0.01" required>
      </div>
      <div class="form-group">
        <input type="text" id="product-description" placeholder="Description">
      </div>
      <button type="submit" id="submit-btn">Add Product</button>
      <button type="button" id="cancel-btn" class="hidden">Cancel</button>
    </form>

    <div id="product-list"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
